<html class="-polaris">
  <head>
    <title>Git Issue Sync</title>
    <sdk:now-ux-globals />
    <style id="gis-css"></style>
    <script src="main.jsx?uxpcb=$[UxFrameworkScriptables.getFlushTimestamp()]" type="module"></script>
  </head>
  <body>
    <div class="gis-page">
      <header class="gis-header">
        <h1 class="gis-header__title">Git Issue Sync</h1>
        <p class="gis-header__subtitle">Synchronize GitHub issues to ServiceNow</p>
      </header>
      <div id="root"></div>
    </div>
    <script>
      /* <![CDATA[ */
      (function () {
        var css = ':root {'
          + '--gis-primary:#43BE4D;'
          + '--gis-primary-dark:#006e1c;'
          + '--gis-navy:#0F384C;'
          + '--gis-on-surface:#001e2d;'
          + '--gis-on-surface-variant:#3f4f58;'
          + '--gis-surface:#f5faff;'
          + '--gis-surface-container-low:#e9f5ff;'
          + '--gis-surface-container-lowest:#ffffff;'
          + '--gis-surface-container-high:#dcedf8;'
          + '--gis-surface-container-highest:#d0e4f2;'
          + '--gis-outline-variant:#bdcab7;'
          + '--gis-error:#ba1a1a;'
          + '--gis-error-bg:#fff0ee;'
          + '--gis-warning-bg:#fff8e8;'
          + '--gis-warning-text:#5c4300;'
          + '--gis-success-bg:#e8f9ea;'
          + '--gis-success-text:#0a5c1e;'
          + '--gis-ambient-shadow:0px 8px 24px rgba(0,30,45,0.06);'
          + '--gis-radius-md:0.375rem;'
          + '--gis-radius-lg:0.75rem;'
          + '}'
          + '*{box-sizing:border-box;}'
          + 'body{margin:0;background:var(--gis-surface);min-height:100vh;}'
          + '.gis-page{max-width:740px;margin:0 auto;padding:48px 24px 64px;font-family:"Source Sans Pro",-apple-system,BlinkMacSystemFont,sans-serif;color:var(--gis-on-surface);line-height:1.5;}'
          + '.gis-header{margin-bottom:48px;padding-left:4px;}'
          + '.gis-header__title{font-size:1.75rem;font-weight:500;margin:0;color:var(--gis-navy);letter-spacing:-0.02em;}'
          + '.gis-header__subtitle{margin:8px 0 0;font-size:0.6875rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--gis-on-surface-variant);}'
          + '.gis-card{background:var(--gis-surface-container-low);border:none;border-radius:var(--gis-radius-lg);padding:32px;display:flex;flex-direction:column;gap:24px;}'
          + '.gis-field{display:flex;flex-direction:column;gap:8px;}'
          + '.gis-field__label{font-weight:500;font-size:0.6875rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--gis-on-surface-variant);}'
          + '.gis-field__help{font-size:0.75rem;color:var(--gis-on-surface-variant);opacity:0.75;}'
          + '.gis-input{padding:10px 12px;border:none;border-bottom:2px solid var(--gis-surface-container-highest);border-radius:var(--gis-radius-md) var(--gis-radius-md) 0 0;font-size:0.875rem;background:var(--gis-surface-container-lowest);color:var(--gis-on-surface);transition:border-color 0.2s ease,background-color 0.2s ease;outline:none;}'
          + '.gis-input:focus{border-bottom-color:var(--gis-primary);background:var(--gis-surface-container-lowest);}'
          + '.gis-input::placeholder{color:var(--gis-on-surface-variant);opacity:0.5;}'
          + '.gis-input:disabled{opacity:0.4;cursor:not-allowed;background:var(--gis-surface-container-high);}'
          + '.gis-modes{display:grid;grid-template-columns:1fr 1fr;gap:12px;}'
          + '.gis-mode{text-align:left;cursor:pointer;border:none;border-radius:var(--gis-radius-lg);padding:16px;background:var(--gis-surface-container-lowest);display:flex;flex-direction:column;gap:6px;transition:background-color 0.2s ease,transform 0.15s ease;outline:2px solid transparent;}'
          + '.gis-mode:hover{background:var(--gis-surface-container-high);transform:translateY(-1px);}'
          + '.gis-mode--selected{background:var(--gis-surface-container-lowest);outline:2px solid rgba(189,202,183,0.15);position:relative;}'
          + '.gis-mode--selected::before{content:\x27\x27;position:absolute;top:0;left:0;right:0;bottom:0;border-radius:var(--gis-radius-lg);background:linear-gradient(135deg,rgba(0,110,28,0.06),rgba(67,190,77,0.08));pointer-events:none;}'
          + '.gis-mode__title{font-weight:500;font-size:0.875rem;color:var(--gis-on-surface);position:relative;}'
          + '.gis-mode__desc{font-size:0.75rem;color:var(--gis-on-surface-variant);position:relative;}'
          + '.gis-radios{display:flex;gap:20px;}'
          + '.gis-radio,.gis-checkbox{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.875rem;}'
          + '.gis-radio input[type="radio"],.gis-checkbox input[type="checkbox"]{accent-color:var(--gis-primary);}'
          + '.gis-actions{display:flex;gap:12px;justify-content:flex-end;padding-top:8px;}'
          + '.gis-btn{padding:10px 20px;border-radius:var(--gis-radius-md);border:none;background:var(--gis-surface-container-highest);color:var(--gis-on-surface);cursor:pointer;font-size:0.875rem;font-weight:500;text-decoration:none;display:inline-flex;align-items:center;transition:background-color 0.2s ease,transform 0.1s ease;}'
          + '.gis-btn:hover{background:var(--gis-surface-container-high);transform:translateY(-1px);}'
          + '.gis-btn--primary{background:linear-gradient(135deg,var(--gis-primary-dark),var(--gis-primary));color:#fff;}'
          + '.gis-btn--primary:hover{background:linear-gradient(135deg,#005a16,#3aad44);transform:translateY(-1px);}'
          + '.gis-btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}'
          + '.gis-progress__phase{font-weight:500;font-size:1rem;color:var(--gis-navy);}'
          + '.gis-progress__pct{font-size:0.6875rem;font-weight:500;text-transform:uppercase;letter-spacing:0.05em;color:var(--gis-on-surface-variant);}'
          + '.gis-bar{height:6px;background:var(--gis-surface-container-highest);border-radius:999px;overflow:hidden;}'
          + '.gis-bar__fill{height:100%;background:linear-gradient(90deg,var(--gis-primary-dark),var(--gis-primary));transition:width 0.4s ease;border-radius:999px;}'
          + '.gis-log{list-style:none;margin:0;padding:0;max-height:200px;overflow-y:auto;font-size:0.8rem;display:flex;flex-direction:column;gap:8px;}'
          + '.gis-log__item{padding:8px 12px;border-bottom:none;background:var(--gis-surface-container-lowest);border-radius:var(--gis-radius-md);color:var(--gis-on-surface-variant);}'
          + '.gis-summary{margin:0;display:flex;flex-direction:column;gap:8px;}'
          + '.gis-summary__row{display:flex;justify-content:space-between;padding:10px 14px;border-bottom:none;background:var(--gis-surface-container-lowest);border-radius:var(--gis-radius-md);}'
          + '.gis-summary__row dt{margin:0;font-size:0.875rem;color:var(--gis-on-surface-variant);}'
          + '.gis-summary__row dd{margin:0;font-weight:600;font-size:0.875rem;color:var(--gis-navy);}'
          + '.gis-alert{padding:16px 20px;border-radius:var(--gis-radius-lg);font-size:0.875rem;font-weight:500;}'
          + '.gis-alert--ok{background:var(--gis-success-bg);color:var(--gis-success-text);}'
          + '.gis-alert--warn{background:var(--gis-warning-bg);color:var(--gis-warning-text);}'
          + '.gis-alert--error{background:var(--gis-error-bg);color:var(--gis-error);border-left:none;}'
          + '.gis-error-detail{display:flex;flex-direction:column;gap:14px;}'
          + '.gis-error-detail__title{display:flex;align-items:center;gap:10px;font-weight:600;font-size:0.95rem;}'
          + '.gis-error-detail__title svg{flex-shrink:0;}'
          + '.gis-error-detail__message{font-size:0.875rem;font-weight:400;line-height:1.5;color:var(--gis-on-surface);}'
          + '.gis-error-detail__hint{font-size:0.8rem;padding:12px 14px;background:rgba(186,26,26,0.04);border-radius:var(--gis-radius-md);line-height:1.5;}'
          + '.gis-error-detail__hint strong{display:block;margin-bottom:6px;font-size:0.6875rem;text-transform:uppercase;letter-spacing:0.05em;color:var(--gis-error);}'
          + '.gis-ref{position:relative;}'
          + '.gis-ref__wrap{display:flex;gap:0;}'
          + '.gis-ref__input{flex:1;border-radius:var(--gis-radius-md) 0 0 0;border-bottom-right-radius:0;}'
          + '.gis-ref__btn{padding:10px 12px;border:none;border-bottom:2px solid var(--gis-surface-container-highest);border-radius:0 var(--gis-radius-md) 0 0;background:var(--gis-surface-container-lowest);cursor:pointer;display:flex;align-items:center;color:var(--gis-on-surface-variant);transition:background-color 0.2s ease,color 0.2s ease;}'
          + '.gis-ref__btn:hover{background:var(--gis-surface-container-high);color:var(--gis-primary-dark);}'
          + '.gis-ref__clear{position:absolute;right:42px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:1.2rem;color:var(--gis-on-surface-variant);padding:4px 6px;line-height:1;transition:color 0.15s ease;}'
          + '.gis-ref__clear:hover{color:var(--gis-error);}'
          + '.gis-ref__results{position:absolute;top:100%;left:0;right:0;z-index:100;margin-top:4px;background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:none;border-radius:var(--gis-radius-lg);box-shadow:var(--gis-ambient-shadow);max-height:220px;overflow-y:auto;display:none;padding:6px;}'
          + '.gis-ref__results--open{display:block;}'
          + '.gis-ref__item{padding:10px 12px;cursor:pointer;font-size:0.875rem;border-bottom:none;border-radius:var(--gis-radius-md);transition:background-color 0.15s ease;}'
          + '.gis-ref__item:hover,.gis-ref__item--active{background:var(--gis-surface-container-low);}'
          + '.gis-ref__item-name{font-weight:500;color:var(--gis-on-surface);}'
          + '.gis-ref__item-meta{font-size:0.6875rem;color:var(--gis-on-surface-variant);margin-top:2px;}'
          + '.gis-ref__empty{padding:16px;font-size:0.8rem;color:var(--gis-on-surface-variant);text-align:center;}'
          + '.gis-ref__selected{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--gis-surface-container-lowest);border:none;border-radius:var(--gis-radius-md);font-size:0.875rem;}'
          + '.gis-ref__selected-name{font-weight:500;color:var(--gis-navy);}'
          + '.gis-ref__selected-type{font-size:0.6875rem;color:var(--gis-on-surface-variant);}'
          + '.gis-or-divider{display:flex;align-items:center;justify-content:center;gap:0;margin:8px 0;font-size:0.6875rem;font-weight:500;color:var(--gis-on-surface-variant);text-transform:uppercase;letter-spacing:0.08em;opacity:0.6;}'
          + '.gis-or-divider::before,.gis-or-divider::after{content:\x27\x27;flex:1;height:1px;background:transparent;}'
          + '@media (max-width:560px){.gis-modes{grid-template-columns:1fr;}.gis-page{padding:32px 16px 48px;}.gis-card{padding:24px 20px;}}';
        document.getElementById('gis-css').textContent = css;

        var API_BASE = '/api/x_snc_git_issue/sync';
        var GCK = window.g_ck;
        var root = document.getElementById('root');
        var POLL_MS = 1500;
        var MAX_POLLS = 200;
        var OK = ['completed', 'completed_with_errors'];
        var syncMode = 'mirror';
        var lastRepoUrl = '';
        var timer = null, polls = 0, fails = 0, lastMsg = '';
        var selectedAlias = null;
        var aliasSearchTimer = null;

        function esc(s) {
          return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
            return c === '&' ? '&amp;' : c === '<' ? '&lt;' : c === '>' ? '&gt;' : '&quot;';
          });
        }

        function api(path, method, bodyObj) {
          var opts = { method: method || 'GET', headers: { 'Accept': 'application/json', 'X-UserToken': GCK } };
          if (bodyObj) { opts.headers['Content-Type'] = 'application/json'; opts.body = JSON.stringify(bodyObj); }
          return fetch(API_BASE + path, opts).then(function (r) {
            return r.json().catch(function () { return {}; }).then(function (j) {
              return (j && j.result !== undefined) ? j.result : j;
            });
          });
        }

        function stopPolling() { if (timer !== null) { clearTimeout(timer); timer = null; } }

        function highlightModes() {
          var btns = root.querySelectorAll('.gis-mode');
          for (var i = 0; i < btns.length; i++) {
            if (btns[i].getAttribute('data-mode') === syncMode) { btns[i].classList.add('gis-mode--selected'); }
            else { btns[i].classList.remove('gis-mode--selected'); }
          }
        }

        function renderForm() {
          stopPolling();
          syncMode = 'mirror';
          selectedAlias = null;
          root.innerHTML = ''
            + '<div class="gis-card">'
            + '  <label class="gis-field"><span class="gis-field__label">Repository URL</span>'
            + '    <input id="repo" class="gis-input" type="text" placeholder="https://github.com/owner/repo" /></label>'
            + '  <div class="gis-field"><span class="gis-field__label">Credential Alias</span>'
            + '    <span class="gis-field__help">Select a Credential Alias configured in Connection &amp; Credential Aliases</span>'
            + '    <div id="alias-container" class="gis-ref">'
            + '      <div id="alias-search-wrap" class="gis-ref__wrap">'
            + '        <input id="alias-search" class="gis-input gis-ref__input" type="text" placeholder="Search credential aliases..." autocomplete="off" />'
            + '        <button id="alias-search-btn" type="button" class="gis-ref__btn" title="Search">'
            + '          <svg width="16" height="16" viewBox="0 0 16 16" fill="none"><circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.5"/><line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>'
            + '        </button>'
            + '      </div>'
            + '      <div id="alias-results" class="gis-ref__results"></div>'
            + '      <div id="alias-selected" style="display:none"></div>'
            + '    </div>'
            + '  </div>'
            + '  <div class="gis-or-divider">or</div>'
            + '  <label class="gis-field"><span class="gis-field__label">Personal Access Token</span>'
            + '    <input id="pat" class="gis-input" type="password" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" autocomplete="off" />'
            + '    <span class="gis-field__help">GitHub PAT with repo scope. Used for this sync only, never stored.</span></label>'
            + '  <div class="gis-field"><span class="gis-field__label">Sync Mode</span>'
            + '    <div class="gis-modes">'
            + '      <button type="button" class="gis-mode" data-mode="mirror"><span class="gis-mode__title">Mirror Repository Structure</span><span class="gis-mode__desc">Issues to custom table, Milestones to custom table</span></button>'
            + '      <button type="button" class="gis-mode" data-mode="user_story"><span class="gis-mode__title">Map to User Stories</span><span class="gis-mode__desc">Issues to Stories, Milestones to Epics</span></button>'
            + '    </div></div>'
            + '  <div class="gis-field"><span class="gis-field__label">Issue State Filter</span>'
            + '    <div class="gis-radios">'
            + '      <label class="gis-radio"><input type="radio" name="state" value="open" checked /> <span>Open</span></label>'
            + '      <label class="gis-radio"><input type="radio" name="state" value="closed" /> <span>Closed</span></label>'
            + '      <label class="gis-radio"><input type="radio" name="state" value="all" /> <span>All</span></label>'
            + '    </div></div>'
            + '  <label class="gis-checkbox"><input id="upd" type="checkbox" /> <span>Update existing records</span></label>'
            + '  <div class="gis-actions"><button id="start" type="button" class="gis-btn gis-btn--primary" disabled>Start Sync</button></div>'
            + '</div>';

          var repo = document.getElementById('repo');
          var startBtn = document.getElementById('start');
          var patInput = document.getElementById('pat');
          var aliasSearch = document.getElementById('alias-search');
          var aliasSearchBtn = document.getElementById('alias-search-btn');
          var aliasResults = document.getElementById('alias-results');

          repo.addEventListener('input', function () { startBtn.disabled = repo.value.trim() === ''; });

          // PAT input: if user types, clear alias selection
          patInput.addEventListener('input', function () {
            if (patInput.value.trim()) {
              clearAliasSelection();
              aliasSearch.disabled = true;
              aliasSearchBtn.disabled = true;
            } else {
              aliasSearch.disabled = false;
              aliasSearchBtn.disabled = false;
            }
          });

          // Alias search
          aliasSearch.addEventListener('input', function () {
            if (aliasSearchTimer) { clearTimeout(aliasSearchTimer); }
            aliasSearchTimer = setTimeout(function () { doAliasSearch(aliasSearch.value.trim()); }, 300);
          });

          aliasSearchBtn.addEventListener('click', function () {
            doAliasSearch(aliasSearch.value.trim());
          });

          // Close dropdown when clicking outside
          document.addEventListener('click', function (e) {
            if (!document.getElementById('alias-container')) return;
            if (!document.getElementById('alias-container').contains(e.target)) {
              aliasResults.classList.remove('gis-ref__results--open');
            }
          });

          var modeBtns = root.querySelectorAll('.gis-mode');
          for (var i = 0; i < modeBtns.length; i++) {
            modeBtns[i].addEventListener('click', function () { syncMode = this.getAttribute('data-mode'); highlightModes(); });
          }
          highlightModes();
          startBtn.addEventListener('click', onStart);
        }

        function doAliasSearch(query) {
          var aliasResults = document.getElementById('alias-results');
          api('/aliases?q=' + encodeURIComponent(query), 'GET').then(function (body) {
            if (!body || !body.success) {
              aliasResults.innerHTML = '<div class="gis-ref__empty">Error searching aliases</div>';
              aliasResults.classList.add('gis-ref__results--open');
              return;
            }
            var data = body.data || [];
            if (data.length === 0) {
              aliasResults.innerHTML = '<div class="gis-ref__empty">No credential aliases found</div>';
              aliasResults.classList.add('gis-ref__results--open');
              return;
            }
            var html = '';
            for (var i = 0; i < data.length; i++) {
              html += '<div class="gis-ref__item" data-sysid="' + esc(data[i].sys_id) + '" data-name="' + esc(data[i].name) + '" data-id="' + esc(data[i].id || '') + '">';
              html += '<div class="gis-ref__item-name">' + esc(data[i].name) + '</div>';
              if (data[i].id) {
                html += '<div class="gis-ref__item-meta">' + esc(data[i].id) + '</div>';
              }
              html += '</div>';
            }
            aliasResults.innerHTML = html;
            aliasResults.classList.add('gis-ref__results--open');

            // Attach click handlers to items
            var items = aliasResults.querySelectorAll('.gis-ref__item');
            for (var j = 0; j < items.length; j++) {
              items[j].addEventListener('click', function () {
                selectAlias(this.getAttribute('data-sysid'), this.getAttribute('data-name'), this.getAttribute('data-id'));
              });
            }
          }).catch(function () {
            aliasResults.innerHTML = '<div class="gis-ref__empty">Error searching aliases</div>';
            aliasResults.classList.add('gis-ref__results--open');
          });
        }

        function selectAlias(sysId, name, id) {
          selectedAlias = { sys_id: sysId, name: name, id: id };
          var aliasResults = document.getElementById('alias-results');
          var aliasSearchWrap = document.getElementById('alias-search-wrap');
          var aliasSelected = document.getElementById('alias-selected');
          var patInput = document.getElementById('pat');

          aliasResults.classList.remove('gis-ref__results--open');
          aliasSearchWrap.style.display = 'none';
          aliasSelected.style.display = 'block';
          aliasSelected.innerHTML = ''
            + '<div class="gis-ref__selected">'
            + '  <div><span class="gis-ref__selected-name">' + esc(name) + '</span>'
            + (id ? '  <span class="gis-ref__selected-type"> (' + esc(id) + ')</span>' : '')
            + '  </div>'
            + '  <button type="button" id="alias-clear" class="gis-ref__clear" title="Clear selection">&times;</button>'
            + '</div>';

          // Disable PAT field
          patInput.value = '';
          patInput.disabled = true;

          document.getElementById('alias-clear').addEventListener('click', function () {
            clearAliasSelection();
          });
        }

        function clearAliasSelection() {
          selectedAlias = null;
          var aliasSearchWrap = document.getElementById('alias-search-wrap');
          var aliasSelected = document.getElementById('alias-selected');
          var aliasSearch = document.getElementById('alias-search');
          var patInput = document.getElementById('pat');

          if (aliasSearchWrap) { aliasSearchWrap.style.display = 'flex'; }
          if (aliasSelected) { aliasSelected.style.display = 'none'; aliasSelected.innerHTML = ''; }
          if (aliasSearch) { aliasSearch.value = ''; aliasSearch.disabled = false; }
          if (patInput) { patInput.disabled = false; }
          var aliasSearchBtn = document.getElementById('alias-search-btn');
          if (aliasSearchBtn) { aliasSearchBtn.disabled = false; }
        }

        function onStart() {
          var repo = document.getElementById('repo').value.trim();
          if (!repo) { return; }
          lastRepoUrl = repo;
          var token = document.getElementById('pat').value.trim();
          var upd = document.getElementById('upd').checked;
          var stateEls = root.querySelectorAll('input[name="state"]');
          var stateVal = 'open';
          for (var i = 0; i < stateEls.length; i++) { if (stateEls[i].checked) { stateVal = stateEls[i].value; } }

          polls = 0; fails = 0; lastMsg = '';
          document.getElementById('start').disabled = true;

          var payload = { repository_url: repo, sync_mode: syncMode, state_filter: stateVal, update_existing: upd };
          if (selectedAlias && selectedAlias.sys_id) {
            payload.credential_alias = selectedAlias.sys_id;
          } else {
            payload.token = token;
          }

          api('/start', 'POST', payload).then(function (body) {
            if (!body || !body.success) {
              renderError(body && body.error, body && body.hint, body && body.code);
              return;
            }
            renderProgress();
            poll(body.sync_id);
          }).catch(function (e) { renderError('Network error: ' + e, 'Check your network connection and try again.', 'network'); });
        }

        function renderProgress() {
          root.innerHTML = ''
            + '<div class="gis-card">'
            + '  <div id="phase" class="gis-progress__phase">Starting</div>'
            + '  <div class="gis-bar"><div id="fill" class="gis-bar__fill" style="width:0%"></div></div>'
            + '  <div id="pct" class="gis-progress__pct">0%</div>'
            + '  <ul id="log" class="gis-log"></ul>'
            + '</div>';
        }

        function poll(syncId) {
          api('/progress/' + syncId, 'GET').then(function (body) {
            if (!body || !body.success) { fails++; reschedule(syncId); return; }
            fails = 0;
            var p = body.data;
            updateProgress(p);
            if (OK.indexOf(p.status) !== -1) { renderResults(p); return; }
            if (p.status === 'failed') { renderError(p.error_message || 'Sync failed', getHintForError(p.error_message), null); return; }
            polls++;
            if (polls >= MAX_POLLS) { renderError('Sync is taking longer than expected.', 'Check Sync History for the final result.', 'timeout'); return; }
            timer = setTimeout(function () { poll(syncId); }, POLL_MS);
          }).catch(function () { fails++; reschedule(syncId); });
        }

        function reschedule(syncId) {
          if (fails >= 3) { renderError('Lost contact with the server while polling.', 'Check Sync History for the final result.', 'polling_lost'); return; }
          timer = setTimeout(function () { poll(syncId); }, POLL_MS);
        }

        function updateProgress(p) {
          var phaseEl = document.getElementById('phase');
          if (!phaseEl) { return; }
          var pct = p.percent_complete || 0;
          phaseEl.textContent = p.current_phase || 'Working';
          document.getElementById('fill').style.width = pct + '%';
          document.getElementById('pct').textContent = pct + '%';
          var msg = p.progress_message || p.current_phase || '';
          if (msg && msg !== lastMsg) {
            lastMsg = msg;
            var li = document.createElement('li');
            li.className = 'gis-log__item';
            li.textContent = msg;
            document.getElementById('log').appendChild(li);
          }
        }

        function getHintForError(msg) {
          if (!msg) return '';
          if (msg.indexOf('401') !== -1 || msg.indexOf('Bad credentials') !== -1) return 'Your token may be expired or revoked. Generate a new personal access token with "repo" scope.';
          if (msg.indexOf('403') !== -1) return 'Ensure your token has the "repo" scope for private repos.';
          if (msg.indexOf('404') !== -1) return 'Double-check the URL. For private repos, ensure you provided a valid token.';
          if (msg.indexOf('429') !== -1) return 'Wait a few minutes and try again, or use a token for higher rate limits.';
          return 'Check System Logs (All > System Logs) for more details.';
        }

        function renderResults(p) {
          stopPolling();
          var listUrl = syncMode === 'user_story'
            ? '/x_snc_git_issue_story_xref_list.do?sysparm_query=' + encodeURIComponent('repository_url=' + lastRepoUrl) + '&sysparm_clear_stack=true'
            : '/x_snc_git_issue_record_list.do?sysparm_query=' + encodeURIComponent('repository_url=' + lastRepoUrl) + '&sysparm_clear_stack=true';
          var withErrors = p.status === 'completed_with_errors';
          var rows = [
            ['Issues created', p.issues_created], ['Issues updated', p.issues_updated], ['Issues skipped', p.issues_skipped],
            ['Milestones created', p.milestones_created], ['Milestones updated', p.milestones_updated], ['Labels created', p.labels_created]
          ];
          var rowsHtml = '';
          for (var i = 0; i < rows.length; i++) {
            rowsHtml += '<div class="gis-summary__row"><dt>' + esc(rows[i][0]) + '</dt><dd>' + esc(rows[i][1] || 0) + '</dd></div>';
          }
          root.innerHTML = ''
            + '<div class="gis-card">'
            + '  <div class="gis-alert ' + (withErrors ? 'gis-alert--warn' : 'gis-alert--ok') + '">'
            + (withErrors ? 'Sync completed with some errors.' : 'Sync completed successfully!') + '</div>'
            + '  <dl class="gis-summary">' + rowsHtml + '</dl>'
            + '  <div class="gis-actions">'
            + '    <a class="gis-btn" href="' + listUrl + '">View list</a>'
            + '    <button id="again" type="button" class="gis-btn gis-btn--primary">Sync another</button>'
            + '  </div>'
            + '</div>';
          document.getElementById('again').addEventListener('click', renderForm);
        }

        function renderError(msg, hint, code) {
          stopPolling();
          var errorMsg = msg || 'An unknown error occurred';
          var hintMsg = hint || getHintForError(errorMsg);
          var icon = '<svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="9" stroke="#ba1a1a" stroke-width="2"/><line x1="10" y1="5.5" x2="10" y2="11" stroke="#ba1a1a" stroke-width="2" stroke-linecap="round"/><circle cx="10" cy="14" r="1.2" fill="#ba1a1a"/></svg>';

          var html = ''
            + '<div class="gis-card">'
            + '  <div class="gis-alert gis-alert--error">'
            + '    <div class="gis-error-detail">'
            + '      <div class="gis-error-detail__title">' + icon + ' Sync Failed</div>'
            + '      <div class="gis-error-detail__message">' + esc(errorMsg) + '</div>';

          if (hintMsg) {
            html += '      <div class="gis-error-detail__hint"><strong>Troubleshooting</strong>' + esc(hintMsg) + '</div>';
          }

          html += ''
            + '    </div>'
            + '  </div>'
            + '  <div class="gis-actions"><button id="back" type="button" class="gis-btn gis-btn--primary">Back to form</button></div>'
            + '</div>';

          root.innerHTML = html;
          document.getElementById('back').addEventListener('click', renderForm);
        }

        renderForm();
      })();
      /* ]]> */
    </script>
  </body>
</html>
